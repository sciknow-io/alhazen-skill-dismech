name: treatment
description: Map dismech treatment to dm-treatment and link to dm-disease
depends_on: [disease]
idempotent: true
source_match: |
  match
    $d isa disease, has name $dname;
    (disease: $d, treatment: $t) isa treatments;
    $t has name $tname;
  fetch {
    "disease_name": $dname,
    "treatment_name": $tname,
    "description": $t.description
  };
target_insert: |
  match
    $td isa dm-disease, has name $disease_name;
  insert
    $tt isa dm-treatment,
      has id $skolem_id,
      has name $treatment_name,
      has description $description;
    (dm-dht-disease: $td, dm-dht-treatment: $tt) isa dm-disease-has-treatment;
skolem_keys: [disease_name, treatment_name]
