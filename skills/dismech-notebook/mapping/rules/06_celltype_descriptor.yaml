name: celltype_descriptor
description: Map dismech celltypedescriptor to dm-celltype-descriptor
depends_on: []
idempotent: true
source_match: |
  match
    $x isa celltypedescriptor, has preferred-term $pt;
  fetch {
    "preferred_term": $pt
  };
target_insert: |
  insert
    $td isa dm-celltype-descriptor,
      has id $skolem_id,
      has name $preferred_term,
      has dm-preferred-term $preferred_term;
skolem_keys: [preferred_term]
