name: phenotype
description: Map dismech phenotype to dm-phenotype and link to dm-disease
depends_on: [disease]
idempotent: true
source_match: |
  match
    $d isa disease, has name $dname;
    (disease: $d, phenotype: $p) isa phenotypes;
    $p has name $pname;
  fetch {
    "disease_name": $dname,
    "phenotype_name": $pname,
    "description": $p.description
  };
target_insert: |
  match
    $td isa dm-disease, has name $disease_name;
  insert
    $tp isa dm-phenotype,
      has id $skolem_id,
      has name $phenotype_name,
      has description $description;
    (dm-dhp-disease: $td, dm-dhp-phenotype: $tp) isa dm-disease-has-phenotype;
skolem_keys: [disease_name, phenotype_name]
