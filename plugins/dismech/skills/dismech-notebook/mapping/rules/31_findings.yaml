name: findings
description: Map dismech finding to dm-finding-note with aboutness to disease
depends_on: [disease]
idempotent: true
source_match: |
  match
    $f isa finding, has statement $stmt;
    (finding: $f, dataset: $ds) isa findings;
    (disease: $d, dataset: $ds) isa datasets;
    $d has name $dname;
  fetch {
    "disease_name": $dname,
    "statement": $stmt
  };
target_insert: |
  match
    $td isa dm-disease, has name $disease_name;
  insert
    $tn isa dm-finding-note,
      has id $skolem_id,
      has name $statement,
      has content $statement,
      has dm-statement $statement;
    (note: $tn, subject: $td) isa aboutness;
skolem_keys: [disease_name, statement]
